name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Run tests
        run: dotnet test --filter 'Category!=DataCollection&Category!=Benchmark&Category!=Slow'

      # Linux native lib (libcryptominisat5.so) is already in runtimes/linux-x64/native/
      - name: Publish
        run: >
          dotnet publish src/ApsGenerator.UI/ApsGenerator.UI.csproj
          -c Release
          -r linux-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package
        run: |
          cd src/ApsGenerator.UI/bin/Release/net10.0/linux-x64/publish
          zip -r "$GITHUB_WORKSPACE/APS-Generator-${{ inputs.version }}-linux-x64.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: APS-Generator-${{ inputs.version }}-linux-x64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      # --- CryptoMiniSat Windows build (MSYS2/MinGW) ---
      - name: Setup MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pkgconf

      - name: Build CryptoMiniSat from source
        shell: msys2 {0}
        run: |
          cd native/cryptominisat
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_PYTHON_INTERFACE=OFF \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build build --target cryptominisat5

      - name: Copy CMS DLL to runtimes
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path native/cryptominisat/build -Recurse -File |
            Where-Object { $_.Name -like "*cryptominisat5*.dll" } |
            Select-Object -First 1
          if (-not $src) { throw "No DLL matching *cryptominisat5* found in build output" }
          $destDir = "src/ApsGenerator.Solver/runtimes/win-x64/native"
          $destFile = Join-Path $destDir "cryptominisat5.dll"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item -Path $src.FullName -Destination $destFile -Force
          Write-Host "Copied $($src.FullName) -> $destFile"

      - name: Run tests
        run: dotnet test --filter 'Category!=DataCollection&Category!=Benchmark&Category!=Slow'

      - name: Publish
        run: >
          dotnet publish src/ApsGenerator.UI/ApsGenerator.UI.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "src/ApsGenerator.UI/bin/Release/net10.0/win-x64/publish/*" `
            -DestinationPath "APS-Generator-${{ inputs.version }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: APS-Generator-${{ inputs.version }}-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-x64

      - uses: actions/download-artifact@v4
        with:
          name: windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            APS-Generator-${{ inputs.version }}-linux-x64.zip
            APS-Generator-${{ inputs.version }}-windows-x64.zip
